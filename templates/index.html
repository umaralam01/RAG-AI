<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAG AI — Ultra Assistant</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet" />

  <style>
    #cursor-glow {
      position: fixed;
      top: 0;
      left: 0;
      display: none;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle,
          rgba(120, 180, 255, 0.45),
          rgba(80, 140, 255, 0.25),
          rgba(0, 80, 255, 0));
      filter: blur(160px);
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.35s ease-out, transform 0.08s linear;
      mix-blend-mode: screen;
      z-index: 0;
    }

    :root {
      --primary: #50207a;
      --accent: #d6b9fc;
      --glow: #838ce5;
      --bg: #0b0b10;
      --panel: rgba(255, 255, 255, 0.04);
      --muted: rgba(255, 255, 255, 0.55);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: linear-gradient(180deg, #05050a 0%, #071428 60%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto,
        "Helvetica Neue", Arial;
    }

    .app {
      overflow: hidden;
      height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 28px;
      padding: 28px;
      align-items: stretch;
    }

    /* SIDEBAR */
    .sidebar {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border: 1px solid rgba(255, 255, 255, 0.03);

      /* POP & GLOW EFFECT */
      box-shadow: 0 10px 40px rgba(127, 90, 240, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      transition: all 0.3s ease;
    }

    /* ON HOVER: glow and slight pop */
    .sidebar:hover {
      transform: translateY(-4px);
      /* slight lift */
      box-shadow: 0 15px 50px rgba(127, 90, 240, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      border-color: rgba(127, 90, 240, 0.4);
      /* glow border */
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.02));
    }


    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--glow));
      color: #0b0b10;
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 8px 30px rgba(83, 47, 125, 0.25);
    }

    .brand h1 {
      margin: 0;
      font-size: 16px;
      color: var(--accent);
    }

    .brand p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    /* Chat history block in sidebar */
    .history-wrap {
      margin-top: auto;
      border-top: 1px dashed rgba(255, 255, 255, 0.02);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-title {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-list {
      max-height: 220px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 8px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.01);
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.01);
      color: var(--muted);
      font-size: 13px;
    }

    .history-item:hover {
      transform: translateX(6px);
      color: white;
    }

    .kb-small {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* CHAT AREA */
    .panel {
      flex: 1;
      min-height: 0;
      border-radius: var(--radius);
      padding: 18px;
      display: flex;
      flex-direction: column;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(255, 255, 255, 0.03);

      /* POP & GLOW EFFECT */
      box-shadow: 0 12px 40px rgba(127, 90, 240, 0.25);
      transition: all 0.3s ease;
    }

    /* ON HOVER: glow & pop */
    .panel:hover {
      transform: translateY(-3px) scale(1.01);
      /* slight lift & pop */
      box-shadow: 0 15px 50px rgba(127, 90, 240, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.02);
      border-color: rgba(127, 90, 240, 0.4);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.02));
    }


    .panel .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .title {
      display: flex;
      flex-direction: column;
    }

    .title h2 {
      margin: 0;
      color: var(--accent);
      font-size: 18px;
    }

    .title p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    /* messages */
    .messages {
      flex: 1;
      overflow: auto;
      padding: 10px 6px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      box-shadow: none !important;
    }

    .msg {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.45;
      position: relative;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg .meta {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }

    .user {
      margin-left: auto;
      background: linear-gradient(90deg,
          rgba(80, 32, 122, 0.12),
          rgba(131, 140, 229, 0.08));
      box-shadow: 0 8px 30px rgba(80, 32, 122, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.02);
      color: white;
    }

    .assistant {
      background: linear-gradient(90deg,
          rgba(12, 14, 20, 0.6),
          rgba(19, 20, 25, 0.55));
      border-left: 4px solid var(--glow);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.6);
      color: #eae9ff;
    }

    .assistant .source {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
      border-top: 1px dashed rgba(255, 255, 255, 0.02);
      padding-top: 8px;
    }

    /* typing indicator */
    .typing {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--glow);
      opacity: 0.9;
      animation: blink 1s infinite;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes blink {
      0% {
        transform: translateY(0);
        opacity: 0.2;
      }

      50% {
        transform: translateY(-6px);
        opacity: 1;
      }

      100% {
        transform: translateY(0);
        opacity: 0.2;
      }
    }

    /* BOTTOM INPUT (ChatGPT-like) */
    .bottom-bar {
      margin-top: 12px;
      padding: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.02);
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn-circle {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      cursor: pointer;
      color: var(--muted);
      transition: 0.25s ease;
      box-shadow: 0 0 8px rgba(100, 100, 255, 0.08);
    }

    .btn-circle:hover {
      border-color: rgba(120, 120, 255, 0.6);
      color: #fff;
      background: rgba(120, 120, 255, 0.12);
      box-shadow: 0 0 12px rgba(120, 120, 255, 0.6),
        0 0 25px rgba(120, 120, 255, 0.4);
      transform: scale(1.06);
    }

    /* size of emoji*/
    #sendBtn {
      font-size: 28px !important;
      line-height: 1;
    }

    .input-large {
      flex: 1;
      min-height: 48px;
      border-radius: 999px;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.03);
      color: var(--muted);
      outline: none;
      font-size: 14px;
      resize: none;

      /* POP & GLOW EFFECT */
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    /* ON FOCUS: glow and slightly pop */
    .input-large:focus {
      border-color: #7f5af0;
      /* neon-ish color */
      box-shadow: 0 0 15px rgba(127, 90, 240, 0.6),
        0 4px 15px rgba(127, 90, 240, 0.3);
      background: rgba(255, 255, 255, 0.05);
      transform: scale(1.02);
      /* slight pop */
      color: #fff;
    }

    .send-circle {
      width: 52px;
      height: 52px;
      border-radius: 999px;

      background: linear-gradient(90deg, var(--primary), var(--glow));
      display: inline-grid;
      place-items: center;

      border: none;
      color: white;
      cursor: pointer;

      /* Base soft glow */
      box-shadow: 0 0 10px rgba(120, 80, 255, 0.25),
        0 0 20px rgba(120, 80, 255, 0.15);

      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    /* Hover Glow */
    .send-circle:hover {
      transform: rotate(-90deg) scale(1.15);

      box-shadow: 0 0 15px rgba(150, 100, 255, 0.6),
        0 0 35px rgba(150, 100, 255, 0.4), 0 0 55px rgba(150, 100, 255, 0.2);
    }

    /* small buttons to the right of input */
    .right-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-left: 8px;
    }

    /* file preview chips */
    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.02);
      color: #ffffff;
    }

    /* code block */
    pre.code {
      background: linear-gradient(180deg,
          rgba(0, 0, 0, 0.55),
          rgba(10, 10, 12, 0.55));
      padding: 12px;
      border-radius: 10px;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.02);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
        "Liberation Mono", monospace;
      font-size: 13px;
      color: #dfe7ff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
    }

    /* responsive */
    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 12px;
      }

      .sidebar {
        display: none;
      }

      .history-wrap {
        display: none;
      }
    }

    /* === Neon Glow Clear Button === */
    .neon-glow-btn {
      padding: 10px 18px;
      color: #fff;
      border: 2px solid #3b82f6;
      border-radius: 10px;
      background: transparent;
      cursor: pointer;
      position: relative;
      transition: 0.4s ease;
      font-size: 13px;
      box-shadow: 0 0 10px #3b82f660;
    }

    .neon-glow-btn:hover {
      box-shadow: 0 0 20px #3b82f6, 0 0 40px #3b82f6aa;
      border-color: #60a5fa;
      transform: scale(1.1);
    }

    #chipContainer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }

    .upload-btn {
      height: 36px;
      display: flex;
      align-items: center;
    }
  </style>
</head>

<body>
  <div class="app">
    <div id="cursor-glow"></div>

    <!-- SIDEBAR -->
    <aside class="sidebar" aria-label="Sidebar">
      <div class="brand">
        <div class="logo">N</div>
        <div>
          <h1>NovaRAG AI</h1>
          <p class="muted">
            Next-Gen RAG — Driven by Your Local Neural Backend
          </p>
        </div>
      </div>
    </aside>

    <!-- CHAT PANEL -->
    <main class="panel" role="main">
      <div class="top">
        <div class="title">
          <h2>NovaRAG AI</h2>
          <p class="muted">
            Ask anything about your uploaded 📁 Files • 🎧 Audio • 🖼️ Images
          </p>
        </div>
        <div id="statusLabel" style="color: #bbb; font-size: 13px; margin-top: 6px">
          Status: Idle
        </div>
        <div style="display: flex; gap: 10px; align-items: center">
          <button class="neon-glow-btn" id="clearBtn" title="Clear chat">
            Clear
          </button>
        </div>
      </div>

      <div class="messages" id="messages" role="log" aria-live="polite"></div>

      <div class="bottom-bar" role="region" aria-label="Message composer">
        <textarea id="inputBox" class="input-large" placeholder="How can I assist you today?"></textarea>
        <div class="right-actions">
          <button id="uploadBtnBottom" class="btn-circle" title="Attach file">
            🔗
          </button>
          <button id="sendBtn" class="send-circle" title="Send">➣</button>
        </div>
      </div>

      <div id="chipContainer" style="padding: 0 18px 18px"></div>
    </main>
  </div>

  <input id="fileInput" type="file" accept=".pdf,.mp3,.wav,.png,.jpg,.jpeg" style="display: none" />

  <script>
    // ---------- STATUS HANDLER ----------
    function setStatus(state) {
      if (!statusLabel) return;

      const messages = {
        ready: "Status: Ready",
        processing: "Status: Processing…",
        reading: "Status: Reading file…",
        understanding: "Status: Understanding your query…",
        generating: "Status: Generating response…",
      };

      statusLabel.textContent = messages[state] || "Status: Ready";
    }

    // ---------- ELEMENTS ----------
    const messagesEl = document.getElementById("messages");
    const inputBox = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");
    const fileInput = document.getElementById("fileInput");
    const uploadBtnBottom = document.getElementById("uploadBtnBottom");
    const statusLabel = document.getElementById("statusLabel");
    const chipContainer = document.getElementById("chipContainer");
    let selectedFile = null;

    // ---------- WELCOME ----------
    const welcomeMessage =
      "Welcome — drop your Documents, Images, or Audio. I’ll handle the rest.";
    const welcomeMeta = "Tip: Use Enter to send.";

    function showWelcome() {
      appendMessage(welcomeMessage, "assistant", welcomeMeta);
      setStatus("ready");
    }
    showWelcome();

    function ts() {
      return new Date().toLocaleTimeString();
    }

    function appendMessage(text, role = "assistant", meta = null) {
      const wrapper = document.createElement("div");
      wrapper.className = "msg " + (role === "user" ? "user" : "assistant");

      const span = document.createElement("div");
      span.textContent = text;
      wrapper.appendChild(span);

      const metaRow = document.createElement("div");
      metaRow.className = "meta";
      metaRow.innerHTML = `<span>${role === "user" ? "You" : "Assistant"
        }</span> • <span>${ts()}</span>`;
      wrapper.appendChild(metaRow);

      if (meta) {
        const src = document.createElement("div");
        src.className = "source";
        src.textContent = meta;
        wrapper.appendChild(src);
      }

      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return wrapper;
    }

    // ---------- SEND MESSAGE ----------
    function sendQuery() {
      const raw = inputBox.value.trim();
      if (!raw && !selectedFile) return;

      appendMessage(raw || `Uploaded: ${selectedFile.name}`, "user");
      inputBox.value = "";

      setStatus("processing");

      const botEl = appendMessage("Processing…", "assistant");

      // ---- Send query to backend ----
      fetch("http://localhost:5000/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: raw }),
      })
        .then((response) => {
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let fullAnswer = "";

          function readChunk() {
            reader.read().then(({ done, value }) => {
              if (done) {
                setStatus("ready");
                return;
              }

              const chunk = decoder.decode(value);
              fullAnswer += chunk;

              // append to assistant message dynamically
              botEl.querySelector("div").textContent = fullAnswer;

              readChunk();
            });
          }

          readChunk();
        })
        .catch((err) => {
          botEl.querySelector("div").textContent =
            "⚠️ Network error: Failed to fetch.";
          setStatus("ready");
          console.error(err);
        });
    }

    sendBtn.addEventListener("click", sendQuery);

    inputBox.addEventListener("keydown", (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === "Enter") sendQuery();
      if (e.key === "Enter" && !e.shiftKey && !(e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendQuery();
      }
    });

    // ---------- FILE UPLOAD ----------
    uploadBtnBottom.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", (ev) => {
      if (ev.target.files && ev.target.files[0]) {
        selectedFile = ev.target.files[0];

        setStatus("reading");

        chipContainer.innerHTML = `<div class="chip">${selectedFile.name
          } (${Math.round(selectedFile.size / 1024)} KB)</div>
         <button class="neon-glow-btn upload-btn">Upload</button>`;
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      messagesEl.innerHTML = "";
      setStatus("ready");
      showWelcome();
    });

    // ---------- CURSOR GLOW ----------
    const glow = document.getElementById("cursor-glow");
    let timeout;

    document.addEventListener("mousemove", (e) => {
      glow.style.transform = `translate(${e.clientX - 450}px, ${e.clientY - 450
        }px)`;
      glow.style.opacity = 1;

      clearTimeout(timeout);
      timeout = setTimeout(() => {
        glow.style.opacity = 0;
      }, 300);
    });

    // ---------- UPLOAD CLICK ----------
    document.addEventListener("click", async (e) => {
      if (e.target.classList.contains("upload-btn")) {
        if (!selectedFile) return alert("No file selected!");

        setStatus("processing");

        e.target.textContent = "Uploading...";
        e.target.disabled = true;

        const formData = new FormData();
        formData.append("file", selectedFile);

        try {
          const uploadRes = await fetch("http://localhost:5000/upload", {
            method: "POST",
            body: formData,
          });

          const result = await uploadRes.json();

          if (result.success) {
            e.target.textContent = "Uploaded ✓";
            e.target.style.borderColor = "#4ade80";
            e.target.style.boxShadow = "0 0 20px #4ade80";

            appendMessage(
              `Uploaded: ${result.filename}`,
              "assistant",
              result.message || "File uploaded successfully."
            );

            setStatus("ready");
            selectedFile = null;
            chipContainer.innerHTML = "";
          } else {
            e.target.textContent = "Error ❌";
            appendMessage(`Upload failed: ${result.error}`, "assistant");
            setStatus("ready");
            e.target.disabled = false;
          }
        } catch (err) {
          e.target.textContent = "Failed ❌ Something went wrong";
          console.error(err);
          appendMessage(
            "Upload failed: Network error or server not running.",
            "assistant"
          );
          setStatus("ready");
          e.target.disabled = false;
        }
      }
    });
  </script>
</body>

</html>
